<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設計料管理 | Design Fee Manager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 200px; background: #fff; border-right: 0.5px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; padding: 16px 0; flex-shrink: 0; }
.logo { padding: 0 16px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.1); margin-bottom: 8px; }
.logo-title { font-size: 14px; font-weight: 500; }
.logo-sub { font-size: 11px; color: #888; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: #555; transition: background 0.15s; user-select: none; }
.nav-item:hover { background: #f5f4f0; color: #1a1a18; }
.nav-item.active { background: #f5f4f0; color: #1a1a18; font-weight: 500; border-left: 2px solid #185FA5; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.page-title { font-size: 15px; font-weight: 500; }
.content { padding: 20px 24px; flex: 1; }

/* Buttons */
.btn { background: transparent; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #1a1a18; transition: background 0.15s; font-family: inherit; }
.btn:hover { background: #f5f4f0; }
.btn-primary { background: #185FA5; color: white; border-color: #185FA5; }
.btn-primary:hover { background: #0C447C; border-color: #0C447C; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Metrics */
.metrics { display: grid; gap: 12px; margin-bottom: 20px; }
.metrics-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.metrics-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.metric-card { background: #eeeee8; border-radius: 8px; padding: 1rem; }
.metric-label { font-size: 12px; color: #666; margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 500; }
.metric-sub { font-size: 11px; color: #888; margin-top: 4px; }

/* Sections */
.section { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.section-header { padding: 14px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.section-title { font-size: 13px; font-weight: 500; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 500; color: #888; border-bottom: 0.5px solid rgba(0,0,0,0.1); background: #f9f9f7; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.07); color: #1a1a18; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9f9f7; }
.empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 13px; }

/* Badges */
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.badge-info    { background: #E6F1FB; color: #0C447C; }
.badge-success { background: #EAF3DE; color: #27500A; }
.badge-warning { background: #FAEEDA; color: #633806; }
.badge-danger  { background: #FCEBEB; color: #791F1F; }
.badge-gray    { background: #F1EFE8; color: #444441; }

/* Progress */
.progress-wrap { background: #eeeee8; border-radius: 4px; height: 6px; overflow: hidden; margin-top: 4px; }
.progress-bar  { height: 100%; border-radius: 4px; background: #185FA5; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); width: 760px; max-width: 97vw; max-height: 92vh; overflow-y: auto; display: flex; flex-direction: column; }
.modal-header { padding: 16px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; flex-shrink: 0; }
.modal-title { font-size: 14px; font-weight: 500; }
.modal-body { padding: 20px; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; gap: 8px; justify-content: flex-end; position: sticky; bottom: 0; background: #fff; flex-shrink: 0; }
.close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; padding: 0 4px; }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
input, select, textarea { width: 100%; padding: 7px 10px; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; font-size: 13px; background: #fff; color: #1a1a18; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #185FA5; }
textarea { resize: vertical; min-height: 60px; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
input[readonly] { background: #f5f4f0; color: #666; }

/* Phase table inside modal */
.phase-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.phase-tbl th { background: #f9f9f7; padding: 6px 8px; font-weight: 500; color: #888; border-bottom: 0.5px solid rgba(0,0,0,0.1); text-align: left; white-space: nowrap; }
.phase-tbl td { padding: 3px 4px; border-bottom: 0.5px solid rgba(0,0,0,0.07); vertical-align: middle; }
.phase-tbl input, .phase-tbl select { padding: 4px 6px; font-size: 12px; border-radius: 6px; }

/* Icon buttons */
.icon-btn { background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #aaa; font-family: inherit; }
.icon-btn:hover      { color: #A32D2D; background: #FCEBEB; }
.icon-btn.edit:hover { color: #185FA5; background: #E6F1FB; }

/* Drag & Drop */
.drag-handle { cursor: grab; color: #ccc; font-size: 15px; text-align: center; width: 20px; user-select: none; }
.drag-handle:hover { color: #888; }
.phase-tbl tr.ph-dragging { opacity: 0.35; }
.phase-tbl tr.ph-drag-over { box-shadow: inset 0 -2px 0 #185FA5; }

/* Info box */
.info-box { background: #f5f4f0; border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-bottom: 14px; }

/* Divider */
.divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 16px 0; }

.sub-text { font-size: 11px; color: #888; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-title">設計料管理</div>
      <div class="logo-sub">Design Fee Manager</div>
    </div>
    <div class="nav-item active" onclick="switchPage('dashboard')" id="nav-dashboard">◻ ダッシュボード</div>
    <div class="nav-item" onclick="switchPage('projects')"  id="nav-projects">◻ 案件管理</div>
    <div class="nav-item" onclick="switchPage('invoices')"  id="nav-invoices">◻ 請求書一覧</div>
    <div class="nav-item" onclick="switchPage('payments')"  id="nav-payments">◻ 入金管理</div>
    <div class="nav-item" onclick="switchPage('calc')"      id="nav-calc">◻ 報酬計算</div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">ダッシュボード</div>
      <div id="topbar-action"></div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ===== Constants =====
const DEFAULT_PHASES = [
  { name: '調査企画業務', ratio: 5  },
  { name: '基本計画業務', ratio: 10 },
  { name: '基本設計業務', ratio: 25 },
  { name: '実施設計業務', ratio: 40 },
  { name: '監理業務',     ratio: 20 },
  { name: 'その他業務',   ratio: 0  },
];
const STATUS_PROJECT = ['進行中', '完了', '保留', '見積中'];
const STATUS_PHASE   = ['未発行', '発行済', '入金済', '一部入金'];

// ===== State =====
let state = {
  page: 'dashboard',
  projects: JSON.parse(localStorage.getItem('dfm2_proj') || '[]'),
  payments: JSON.parse(localStorage.getItem('dfm2_pay')  || '[]'),
};

function save() {
  localStorage.setItem('dfm2_proj', JSON.stringify(state.projects));
  localStorage.setItem('dfm2_pay',  JSON.stringify(state.payments));
}

// ===== Utils =====
function fmt(n)     { return Number(n || 0).toLocaleString('ja-JP'); }
function fmtDate(d) { return d ? d.replace(/-/g, '/') : '—'; }
function genId()    { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today()    { return new Date().toISOString().slice(0, 10); }
function statusBadge(s) {
  const m = {
    '進行中': 'badge-info', '完了': 'badge-success', '保留': 'badge-warning', '見積中': 'badge-gray',
    '未発行': 'badge-gray', '発行済': 'badge-warning', '入金済': 'badge-success',
    '一部入金': 'badge-info', '未入金': 'badge-danger',
  };
  return m[s] || 'badge-gray';
}

// Flat list of all phases with project reference
function allPhases() {
  return state.projects.flatMap(p =>
    (p.phases || []).map(ph => ({ ...ph, project: p }))
  );
}

function phasePaid(phaseId) {
  return state.payments
    .filter(p => p.phaseId === phaseId)
    .reduce((s, p) => s + Number(p.amount), 0);
}

function phaseBalance(phase) {
  return Number(phase.feeWithTax || 0) - phasePaid(phase.id);
}

function projectTotals(proj) {
  const phases      = proj.phases || [];
  const totalFee    = phases.reduce((s, ph) => s + Number(ph.feeWithTax || 0), 0);
  const totalPaid   = phases.reduce((s, ph) => s + phasePaid(ph.id), 0);
  const activeCount = phases.filter(ph => Number(ph.feeWithTax || 0) > 0).length;
  const paidCount   = phases.filter(ph => Number(ph.feeWithTax || 0) > 0 && phaseBalance(ph) <= 0).length;
  return { totalFee, totalPaid, unpaid: totalFee - totalPaid, paidCount, activeCount };
}

// ===== Navigation =====
function switchPage(p) {
  state.page = p;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + p)?.classList.add('active');
  render();
}

function render() {
  const titles = { dashboard: 'ダッシュボード', projects: '案件管理', invoices: '請求書一覧', payments: '入金管理', calc: '報酬計算' };
  document.getElementById('page-title').textContent = titles[state.page] || '';
  const actionEl  = document.getElementById('topbar-action');
  const contentEl = document.getElementById('main-content');
  if      (state.page === 'dashboard') { actionEl.innerHTML = ''; renderDashboard(contentEl); }
  else if (state.page === 'projects')  { actionEl.innerHTML = '<button class="btn btn-primary" onclick="openProjectModal()">+ 新規案件</button>'; renderProjects(contentEl); }
  else if (state.page === 'invoices')  { actionEl.innerHTML = ''; renderInvoices(contentEl); }
  else if (state.page === 'payments')  { actionEl.innerHTML = ''; renderPayments(contentEl); }
  else if (state.page === 'calc')      { actionEl.innerHTML = ''; renderCalc(contentEl); }
}

// ===== Dashboard =====
function renderDashboard(el) {
  const totalFee     = state.projects.reduce((s, p) => s + projectTotals(p).totalFee, 0);
  const totalPaid    = state.projects.reduce((s, p) => s + projectTotals(p).totalPaid, 0);
  const unpaid       = totalFee - totalPaid;
  const activeProj   = state.projects.filter(p => p.status === '進行中').length;
  const unpaidPhases = allPhases().filter(ph => Number(ph.feeWithTax || 0) > 0 && phaseBalance(ph) > 0);

  const projRows = state.projects.slice().reverse().map(p => {
    const t   = projectTotals(p);
    const pct = t.activeCount > 0 ? Math.round(t.paidCount / t.activeCount * 100) : 0;
    return `<tr>
      <td><a style="color:#185FA5;cursor:pointer" onclick="openProjectDetail('${p.id}')">${p.name}</a></td>
      <td>${p.client || '—'}</td>
      <td style="text-align:right">¥${fmt(t.totalFee)}</td>
      <td style="min-width:130px">
        <div class="sub-text">${t.paidCount} / ${t.activeCount} フェーズ完了</div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      </td>
      <td><span class="badge ${statusBadge(p.status)}">${p.status}</span></td>
    </tr>`;
  }).join('');

  const unpaidRows = unpaidPhases.map(ph => {
    const bal = phaseBalance(ph);
    return `<tr>
      <td>${ph.project.name}</td>
      <td>${ph.name}</td>
      <td>${ph.invoiceNumber || '—'}</td>
      <td>${fmtDate(ph.dueDate)}</td>
      <td style="text-align:right;color:#A32D2D">¥${fmt(bal)}</td>
      <td><span class="badge ${statusBadge(ph.status)}">${ph.status}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="metrics metrics-4">
      <div class="metric-card"><div class="metric-label">受注総額（税込）</div><div class="metric-value">¥${fmt(totalFee)}</div><div class="metric-sub">${state.projects.length} 件</div></div>
      <div class="metric-card"><div class="metric-label">入金済合計</div><div class="metric-value">¥${fmt(totalPaid)}</div></div>
      <div class="metric-card"><div class="metric-label">未収残高</div><div class="metric-value" style="color:${unpaid > 0 ? '#A32D2D' : 'inherit'}">¥${fmt(unpaid)}</div></div>
      <div class="metric-card"><div class="metric-label">進行中案件</div><div class="metric-value">${activeProj} 件</div><div class="metric-sub">未収フェーズ ${unpaidPhases.length} 件</div></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-title">案件別進捗</span><button class="btn btn-sm" onclick="switchPage('projects')">すべて表示</button></div>
      ${state.projects.length === 0
        ? '<div class="empty-state">案件がありません</div>'
        : `<table><thead><tr><th>案件名</th><th>クライアント</th><th style="text-align:right">設計料合計（税込）</th><th>フェーズ進捗</th><th>状況</th></tr></thead><tbody>${projRows}</tbody></table>`}
    </div>
    <div class="section">
      <div class="section-header"><span class="section-title">未収フェーズ一覧</span></div>
      ${unpaidPhases.length === 0
        ? '<div class="empty-state">未収のフェーズはありません</div>'
        : `<table><thead><tr><th>案件名</th><th>フェーズ</th><th>請求書番号</th><th>支払期日</th><th style="text-align:right">残高</th><th>状況</th></tr></thead><tbody>${unpaidRows}</tbody></table>`}
    </div>`;
}

// ===== Projects =====
function renderProjects(el) {
  const rows = state.projects.map(p => {
    const t   = projectTotals(p);
    const pct = t.activeCount > 0 ? Math.round(t.paidCount / t.activeCount * 100) : 0;
    return `<tr>
      <td><a style="color:#185FA5;cursor:pointer" onclick="openProjectDetail('${p.id}')">${p.name}</a></td>
      <td>${p.client || '—'}</td>
      <td style="text-align:right">¥${fmt(t.totalFee)}</td>
      <td style="min-width:110px">
        <div class="sub-text">${t.paidCount} / ${t.activeCount}</div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      </td>
      <td><span class="badge ${statusBadge(p.status)}">${p.status}</span></td>
      <td>
        <button class="icon-btn edit" onclick="openProjectModal('${p.id}')">編集</button>
        <button class="icon-btn"      onclick="deleteProject('${p.id}')">削除</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<div class="section">
    <div class="section-header"><span class="section-title">案件一覧（${state.projects.length} 件）</span></div>
    ${state.projects.length === 0
      ? '<div class="empty-state">案件がありません。「+ 新規案件」から追加してください。</div>'
      : `<table><thead><tr><th>案件名</th><th>クライアント</th><th style="text-align:right">設計料合計（税込）</th><th>フェーズ進捗</th><th>状況</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`}
  </div>`;
}

// --- Project Detail (read-only modal) ---
function openProjectDetail(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  const t = projectTotals(p);

  const phaseRows = (p.phases || []).map(ph => {
    const paid    = phasePaid(ph.id);
    const balance = Number(ph.feeWithTax || 0) - paid;
    return `<tr>
      <td>${ph.name}</td>
      <td style="text-align:right">${ph.ratio}%</td>
      <td style="text-align:right">¥${fmt(ph.fee)}</td>
      <td style="text-align:right">¥${fmt(ph.feeWithTax)}</td>
      <td>${ph.invoiceNumber || '—'}</td>
      <td>${fmtDate(ph.issueDate)}</td>
      <td>${fmtDate(ph.dueDate)}</td>
      <td><span class="badge ${statusBadge(ph.status)}">${ph.status}</span></td>
      <td style="text-align:right;color:${balance > 0 ? '#A32D2D' : '#27500A'}">¥${fmt(balance)}</td>
    </tr>`;
  }).join('');

  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-body').innerHTML = `
    <div class="info-box" style="display:flex;gap:24px;flex-wrap:wrap">
      <div><div class="sub-text">クライアント</div>${p.client || '—'}</div>
      <div><div class="sub-text">状況</div><span class="badge ${statusBadge(p.status)}">${p.status}</span></div>
      <div><div class="sub-text">工事費用（税抜）</div>¥${fmt(p.constructionCost)}</div>
      <div><div class="sub-text">設計料率</div>${p.feeRate}%</div>
      <div><div class="sub-text">設計料合計（税込）</div><strong>¥${fmt(t.totalFee)}</strong></div>
      <div><div class="sub-text">未収残高</div><strong style="color:${t.unpaid > 0 ? '#A32D2D' : '#27500A'}">¥${fmt(t.unpaid)}</strong></div>
    </div>
    <div style="overflow-x:auto">
      <table class="phase-tbl">
        <thead><tr>
          <th>フェーズ名</th><th style="text-align:right">按分%</th>
          <th style="text-align:right">税抜</th><th style="text-align:right">税込</th>
          <th>請求書番号</th><th>発行日</th><th>支払期日</th><th>状況</th>
          <th style="text-align:right">残高</th>
        </tr></thead>
        <tbody>${phaseRows}</tbody>
      </table>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn" onclick="closeModal()">閉じる</button>
    <button class="btn btn-primary" onclick="closeModal();openProjectModal('${id}')">編集</button>`;
  document.getElementById('modal').classList.add('show');
}

// --- Project Add / Edit Modal ---
function openProjectModal(id) {
  const p      = id ? state.projects.find(x => x.id === id) : null;
  const phases = p
    ? (p.phases || [])
    : DEFAULT_PHASES.map(ph => ({
        id: genId(), name: ph.name, ratio: ph.ratio,
        fee: 0, feeWithTax: 0,
        invoiceNumber: '', issueDate: '', dueDate: '',
        status: '未発行',
      }));

  document.getElementById('modal-title').textContent = p ? '案件を編集' : '新規案件を追加';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label class="form-label">案件名 *</label><input id="fp-name" value="${p?.name || ''}" placeholder="例：〇〇邸新築工事"></div>
      <div class="form-group"><label class="form-label">クライアント名</label><input id="fp-client" value="${p?.client || ''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">所在地</label><input id="fp-location" value="${p?.location || ''}" placeholder="例：兵庫県明石市"></div>
      <div class="form-group"><label class="form-label">状況</label><select id="fp-status">${STATUS_PROJECT.map(s => `<option${p?.status === s ? ' selected' : ''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">契約日</label><input id="fp-contractDate" type="date" value="${p?.contractDate || ''}"></div>
      <div class="form-group"><label class="form-label">完了予定日</label><input id="fp-completionDate" type="date" value="${p?.completionDate || ''}"></div>
    </div>
    <hr class="divider">
    <div class="form-row-3">
      <div class="form-group"><label class="form-label">工事費用（税抜・円）</label><input id="fp-cost"    type="number" value="${p?.constructionCost || ''}" placeholder="30000000" oninput="recalcPhases()"></div>
      <div class="form-group"><label class="form-label">設計料率（%）</label><input id="fp-feeRate" type="number" value="${p?.feeRate ?? 10}" step="0.1" oninput="recalcPhases()"></div>
      <div class="form-group"><label class="form-label">消費税率</label>
        <select id="fp-taxRate" onchange="recalcPhases()">

      <table class="phase-tbl">
        <thead><tr>
          <th style="width:20px"></th>
          <th style="min-width:120px">フェーズ名</th>
          <th style="text-align:right;width:56px">按分%</th>
          <th style="text-align:right;width:110px">税抜（円）</th>
          <th style="text-align:right;width:110px">税込（円）</th>

          <th style="width:108px">発行日</th>

    <button class="btn" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveProject('${id || ''}')">保存</button>`;
  document.getElementById('modal').classList.add('show');
  updatePhaseTotal();
}

function phaseRowHtml(ph) {
  const statusOpts = STATUS_PHASE.map(s => `<option${ph.status === s ? ' selected' : ''}>${s}</option>`).join('');
  return `<tr id="phrow-${ph.id}" draggable="true"
    ondragstart="phDragStart(event)" ondragover="phDragOver(event)"
    ondragleave="phDragLeave(event)" ondrop="phDrop(event)" ondragend="phDragEnd(event)">
    <td class="drag-handle" title="ドラッグして並び替え">⠿</td>
    <td><input value="${ph.name}"></td>
    <td><input type="number" id="ph-ratio-${ph.id}" style="text-align:right" value="${ph.ratio}" min="0" max="100" oninput="recalcPhases()"></td>
    <td><input type="number" id="ph-fee-${ph.id}"   style="text-align:right" value="${ph.fee || 0}" oninput="onManualFee('${ph.id}')"></td>
    <td><input type="number" id="ph-fwt-${ph.id}"   style="text-align:right" value="${ph.feeWithTax || 0}" readonly></td>
    <td><input id="ph-inv-${ph.id}"   value="${ph.invoiceNumber || ''}"></td>
    <td><input id="ph-idate-${ph.id}" type="date" value="${ph.issueDate || ''}"></td>
    <td><input id="ph-ddate-${ph.id}" type="date" value="${ph.dueDate || ''}"></td>
    <td><select id="ph-st-${ph.id}">${statusOpts}</select></td>
    <td><button class="icon-btn" type="button" onclick="removePhaseRow('${ph.id}')">✕</button></td>
  </tr>`;
}

function onManualFee(id) {
  const fee     = Number(document.getElementById('ph-fee-' + id)?.value || 0);
  const taxRate = Number(document.getElementById('fp-taxRate')?.value || 10);
  const fwtEl   = document.getElementById('ph-fwt-' + id);
  if (fwtEl) fwtEl.value = fee + Math.round(fee * taxRate / 100);
  updatePhaseTotal();
}

function recalcPhases() {
  const cost    = Number(document.getElementById('fp-cost')?.value    || 0);
  const feeRate = Number(document.getElementById('fp-feeRate')?.value || 10);
  const taxRate = Number(document.getElementById('fp-taxRate')?.value || 10);
  const tbody   = document.getElementById('phase-tbody');
  if (!tbody) return;
  Array.from(tbody.querySelectorAll('tr')).forEach(row => {
    const id    = row.id.replace('phrow-', '');
    const ratio = Number(document.getElementById('ph-ratio-' + id)?.value || 0);
    const fee   = Math.round(cost * feeRate / 100 * ratio / 100);
    const feeEl = document.getElementById('ph-fee-' + id);
    const fwtEl = document.getElementById('ph-fwt-' + id);
    if (feeEl) feeEl.value = fee;
    if (fwtEl) fwtEl.value = fee + Math.round(fee * taxRate / 100);
  });
  updatePhaseTotal();
}

function updatePhaseTotal() {
  const el    = document.getElementById('phase-total');
  const tbody = document.getElementById('phase-tbody');
  if (!el || !tbody) return;
  let totalRatio = 0, totalFwt = 0;
  Array.from(tbody.querySelectorAll('tr')).forEach(row => {
    const id = row.id.replace('phrow-', '');
    totalRatio += Number(document.getElementById('ph-ratio-' + id)?.value || 0);
    totalFwt   += Number(document.getElementById('ph-fwt-'   + id)?.value || 0);
  });
  const col = Math.abs(totalRatio - 100) < 0.01 ? '#27500A' : '#A32D2D';
  el.innerHTML = `按分合計: <strong style="color:${col}">${totalRatio}%</strong>　設計料合計（税込）: <strong>¥${fmt(totalFwt)}</strong>`;
}

function addPhaseRow() {
  const tbody = document.getElementById('phase-tbody');
  if (!tbody) return;
  const ph  = { id: genId(), name: 'カスタム業務', ratio: 0, fee: 0, feeWithTax: 0, invoiceNumber: '', issueDate: '', dueDate: '', status: '未発行' };
  const tmp = document.createElement('tbody');
  tmp.innerHTML = phaseRowHtml(ph);
  tbody.appendChild(tmp.firstElementChild);
  updatePhaseTotal();
}

function removePhaseRow(id) {
  document.getElementById('phrow-' + id)?.remove();
  updatePhaseTotal();
}

function getEditPhases() {
  const tbody = document.getElementById('phase-tbody');
  if (!tbody) return [];
  return Array.from(tbody.querySelectorAll('tr')).map(row => {
    const id   = row.id.replace('phrow-', '');
    const name = row.querySelector('input')?.value || '';
    return {
      id,
      name,
      ratio:         Number(document.getElementById('ph-ratio-' + id)?.value || 0),
      fee:           Number(document.getElementById('ph-fee-'   + id)?.value || 0),
      feeWithTax:    Number(document.getElementById('ph-fwt-'   + id)?.value || 0),
      invoiceNumber: document.getElementById('ph-inv-'   + id)?.value || '',
      issueDate:     document.getElementById('ph-idate-' + id)?.value || '',
      dueDate:       document.getElementById('ph-ddate-' + id)?.value || '',
      status:        document.getElementById('ph-st-'    + id)?.value || '未発行',
    };
  });
}

function saveProject(id) {
  const name = document.getElementById('fp-name').value.trim();
  if (!name) { alert('案件名を入力してください'); return; }
  const data = {
    id: id || genId(),
    name,
    client:           document.getElementById('fp-client').value,
    location:         document.getElementById('fp-location').value,
    status:           document.getElementById('fp-status').value,
    contractDate:     document.getElementById('fp-contractDate').value,
    completionDate:   document.getElementById('fp-completionDate').value,
    constructionCost: Number(document.getElementById('fp-cost').value    || 0),
    feeRate:          Number(document.getElementById('fp-feeRate').value || 0),
    taxRate:          document.getElementById('fp-taxRate').value,
    memo:             document.getElementById('fp-memo').value,
    phases:           getEditPhases(),
  };
  if (id) {
    const idx = state.projects.findIndex(p => p.id === id);
    state.projects[idx] = data;
  } else {
    state.projects.push(data);
  }
  save(); closeModal(); render();
}

function deleteProject(id) {
  if (!confirm('この案件を削除しますか？\n関連する入金記録も削除されます。')) return;
  const proj = state.projects.find(p => p.id === id);
  if (proj) {
    const ids = new Set((proj.phases || []).map(ph => ph.id));
    state.payments = state.payments.filter(p => !ids.has(p.phaseId));
  }
  state.projects = state.projects.filter(p => p.id !== id);
  save(); render();
}

  const unpaid      = totalBilled - totalPaid;

  const phaseRows = allPhases().map(ph => {
    const paid    = phasePaid(ph.id);
    const balance = Number(ph.feeWithTax || 0) - paid;
    const st      = balance <= 0 && Number(ph.feeWithTax || 0) > 0 ? '入金済' : paid > 0 ? '一部入金' : '未入金';
    return `<tr>
      <td>${ph.project.name}</td>
      <td>${ph.name}</td>
      <td>${ph.invoiceNumber || '—'}</td>
      <td>${fmtDate(ph.dueDate)}</td>
      <td style="text-align:right">¥${fmt(ph.feeWithTax)}</td>

  const payRows = state.payments.slice().reverse().map(pay => {
    const ph = allPhases().find(x => x.id === pay.phaseId);
    return `<tr>
      <td>${fmtDate(pay.date)}</td>
      <td>${ph?.project.name || '—'}</td>
      <td>${ph?.name || '—'}</td>
      <td>${ph?.invoiceNumber || '—'}</td>

    <div class="section">

function renderCalc(el) {
  const phaseInputs = DEFAULT_PHASES.map((ph, i) =>
    `<div class="form-group" style="margin-bottom:10px">
       <label class="form-label">${ph.name}（%）</label>
       <input id="c-p${i}" type="number" value="${ph.ratio}" min="0" oninput="calcFee()">
     </div>`
  ).join('');
  el.innerHTML = `
    <div class="section" style="max-width:640px">
      <div class="section-header"><span class="section-title">設計料 簡易計算ツール</span></div>
      <div style="padding:20px">
        <div class="form-row-3">
          <div class="form-group"><label class="form-label">工事費用（税抜・万円）</label><input id="c-cost" type="number" placeholder="例：3000" oninput="calcFee()"></div>
          <div class="form-group"><label class="form-label">設計料率（%）</label><input id="c-rate" type="number" value="10" step="0.5" oninput="calcFee()"></div>
          <div class="form-group"><label class="form-label">消費税率</label>
            <select id="c-tax" onchange="calcFee()">
              <option value="10">10%</option><option value="8">8%</option><option value="0">非課税</option>
            </select>
          </div>
        </div>
        <div id="c-result"></div>
        <hr class="divider">
        <div style="font-size:12px;color:#666;font-weight:500;margin-bottom:10px">各業務フェーズ按分</div>
        <div class="form-row-3">${phaseInputs}</div>
        <div id="c-phase-result"></div>
      </div>
    </div>`;
}

function calcFee() {
  const cost    = Number(document.getElementById('c-cost')?.value || 0) * 10000;
  const rate    = Number(document.getElementById('c-rate')?.value || 10);
  const taxRate = Number(document.getElementById('c-tax')?.value  || 10);
  const fee     = cost * rate / 100;
  const tax     = Math.round(fee * taxRate / 100);
  const rEl     = document.getElementById('c-result');
  if (!rEl) return;
  if (!cost) { rEl.innerHTML = ''; document.getElementById('c-phase-result').innerHTML = ''; return; }

  rEl.innerHTML = `<div class="metrics metrics-3" style="margin-bottom:8px">
    <div class="metric-card"><div class="metric-label">設計料（税抜）</div><div class="metric-value" style="font-size:18px">¥${fmt(fee)}</div></div>
    <div class="metric-card"><div class="metric-label">消費税</div><div class="metric-value" style="font-size:18px">¥${fmt(tax)}</div></div>
    <div class="metric-card"><div class="metric-label">設計料合計（税込）</div><div class="metric-value" style="font-size:18px">¥${fmt(fee + tax)}</div></div>
  </div>`;

  const phases = DEFAULT_PHASES.map((ph, i) => {
    const ratio = Number(document.getElementById('c-p' + i)?.value || 0);
    const f     = fee * ratio / 100;
    const t     = Math.round(f * taxRate / 100);
    return { name: ph.name, ratio, fee: f, fwt: f + t };
  });
  const totalRatio = phases.reduce((s, p) => s + p.ratio, 0);
  const col = Math.abs(totalRatio - 100) < 0.01 ? '#27500A' : '#A32D2D';

  document.getElementById('c-phase-result').innerHTML = `
    <table>
      <thead><tr><th>フェーズ</th><th style="text-align:right">割合</th><th style="text-align:right">税抜金額</th><th style="text-align:right">税込金額</th></tr></thead>
      <tbody>${phases.map(p => `<tr><td>${p.name}</td><td style="text-align:right">${p.ratio}%</td><td style="text-align:right">¥${fmt(p.fee)}</td><td style="text-align:right">¥${fmt(p.fwt)}</td></tr>`).join('')}</tbody>
      <tfoot><tr style="font-weight:500;background:#f9f9f7">
        <td>合計</td>
        <td style="text-align:right;color:${col}">${totalRatio}%</td>
        <td style="text-align:right">¥${fmt(fee)}</td>
        <td style="text-align:right">¥${fmt(fee + tax)}</td>
      </tr></tfoot>
    </table>`;
}

// ===== Phase Drag & Drop =====
let _dragSrc = null;

function phDragStart(e) {
  _dragSrc = e.currentTarget;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _dragSrc.id);
  setTimeout(() => _dragSrc?.classList.add('ph-dragging'), 0);
}

function phDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (row !== _dragSrc) row.classList.add('ph-drag-over');
}

function phDragLeave(e) {
  e.currentTarget.classList.remove('ph-drag-over');
}

function phDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const target = e.currentTarget;
  target.classList.remove('ph-drag-over');
  if (!_dragSrc || _dragSrc === target) return;
  const tbody = target.closest('tbody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  const si    = rows.indexOf(_dragSrc);
  const ti    = rows.indexOf(target);
  if (si < ti) tbody.insertBefore(_dragSrc, target.nextSibling);
  else         tbody.insertBefore(_dragSrc, target);
  updatePhaseTotal();
}

function phDragEnd(e) {
  _dragSrc?.classList.remove('ph-dragging');
  document.querySelectorAll('#phase-tbody tr').forEach(r => r.classList.remove('ph-drag-over'));
  _dragSrc = null;
}

// ===== Modal =====
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ===== Init =====
render();
</script>
</body>
</html>

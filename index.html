<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>設計料管理 | Design Fee Manager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 200px; background: #fff; border-right: 0.5px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; padding: 16px 0; flex-shrink: 0; }
.logo { padding: 0 16px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.1); margin-bottom: 8px; }
.logo-title { font-size: 14px; font-weight: 500; }
.logo-sub { font-size: 11px; color: #888; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: #555; transition: background 0.15s; user-select: none; }
.nav-item:hover { background: #f5f4f0; color: #1a1a18; }
.nav-item.active { background: #f5f4f0; color: #1a1a18; font-weight: 500; border-left: 2px solid #185FA5; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.page-title { font-size: 15px; font-weight: 500; }
.content { padding: 20px 24px; flex: 1; }
.btn { background: transparent; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #1a1a18; transition: background 0.15s; font-family: inherit; }
.btn:hover { background: #f5f4f0; }
.btn-primary { background: #185FA5; color: white; border-color: #185FA5; }
.btn-primary:hover { background: #0C447C; border-color: #0C447C; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.metrics { display: grid; gap: 12px; margin-bottom: 20px; }
.metrics-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.metrics-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.metric-card { background: #eeeee8; border-radius: 8px; padding: 1rem; }
.metric-label { font-size: 12px; color: #666; margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 500; }
.metric-sub { font-size: 11px; color: #888; margin-top: 4px; }
.section { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.section-header { padding: 14px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.section-title { font-size: 13px; font-weight: 500; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 500; color: #888; border-bottom: 0.5px solid rgba(0,0,0,0.1); background: #f9f9f7; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.07); color: #1a1a18; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9f9f7; }
.empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 13px; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.badge-info    { background: #E6F1FB; color: #0C447C; }
.badge-success { background: #EAF3DE; color: #27500A; }
.badge-warning { background: #FAEEDA; color: #633806; }
.badge-danger  { background: #FCEBEB; color: #791F1F; }
.badge-gray    { background: #F1EFE8; color: #444441; }
.progress-wrap { background: #eeeee8; border-radius: 4px; height: 6px; overflow: hidden; margin-top: 4px; }
.progress-bar  { height: 100%; border-radius: 4px; background: #185FA5; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); width: 1000px; max-width: 97vw; max-height: 92vh; overflow-y: auto; display: flex; flex-direction: column; }
.modal-header { padding: 16px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; flex-shrink: 0; }
.modal-title { font-size: 14px; font-weight: 500; }
.modal-body { padding: 20px; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; gap: 8px; justify-content: flex-end; position: sticky; bottom: 0; background: #fff; flex-shrink: 0; }
.close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; padding: 0 4px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
input, select, textarea { width: 100%; padding: 7px 10px; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; font-size: 13px; background: #fff; color: #1a1a18; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #185FA5; }
textarea { resize: vertical; min-height: 60px; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
input[readonly] { background: #f5f4f0; color: #666; }
.phase-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.phase-tbl th { background: #f9f9f7; padding: 6px 8px; font-weight: 500; color: #888; border-bottom: 0.5px solid rgba(0,0,0,0.1); text-align: left; white-space: nowrap; }
.phase-tbl td { padding: 3px 4px; border-bottom: 0.5px solid rgba(0,0,0,0.07); vertical-align: middle; }
.phase-tbl input, .phase-tbl select { padding: 4px 6px; font-size: 12px; border-radius: 6px; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #aaa; font-family: inherit; }
.icon-btn:hover      { color: #A32D2D; background: #FCEBEB; }
.icon-btn.edit:hover { color: #185FA5; background: #E6F1FB; }
.drag-handle { cursor: grab; color: #ccc; font-size: 15px; text-align: center; width: 20px; user-select: none; }
.drag-handle:hover { color: #888; }
.phase-tbl tr.ph-dragging { opacity: 0.35; }
.phase-tbl tr.ph-drag-over { box-shadow: inset 0 -2px 0 #185FA5; }
.info-box { background: #f5f4f0; border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-bottom: 14px; }
.divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 16px 0; }
.sub-text { font-size: 11px; color: #888; }
/* Auth */
.auth-overlay { display: none; position: fixed; inset: 0; background: #f5f4f0; z-index: 200; align-items: center; justify-content: center; }
.auth-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 16px; padding: 32px; width: 360px; max-width: 95vw; }
.auth-logo { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.auth-sub { font-size: 12px; color: #888; margin-bottom: 24px; }
.auth-input { display: block; width: 100%; padding: 9px 12px; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; font-size: 13px; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; }
.auth-input:focus { outline: none; border-color: #185FA5; }
.auth-btn { display: block; width: 100%; padding: 9px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; text-align: center; border: 0.5px solid rgba(0,0,0,0.25); background: #fff; color: #1a1a18; margin-bottom: 8px; transition: background 0.15s; }
.auth-btn:hover { background: #f5f4f0; }
.auth-btn-primary { background: #185FA5; color: #fff; border-color: #185FA5; }
.auth-btn-primary:hover { background: #0C447C; border-color: #0C447C; }
.auth-divider { text-align: center; font-size: 12px; color: #aaa; margin: 12px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-title">設計料管理</div>
      <div class="logo-sub">Design Fee Manager</div>
    </div>
    <div class="nav-item active" onclick="switchPage('dashboard')" id="nav-dashboard">◻ ダッシュボード</div>
    <div class="nav-item" onclick="switchPage('projects')"  id="nav-projects">◻ 案件管理</div>
    <div class="nav-item" onclick="switchPage('invoices')"  id="nav-invoices">◻ 請求書一覧</div>
    <div class="nav-item" onclick="switchPage('payments')"  id="nav-payments">◻ 入金管理</div>
    <div class="nav-item" onclick="switchPage('calc')"      id="nav-calc">◻ 報酬計算</div>
    <div class="nav-item" id="nav-cashflow" onclick="switchPage('cashflow')" style="display:none">◻ キャッシュフロー</div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">ダッシュボード</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="role-badge" style="font-size:12px;color:#888"></span>
        <div id="topbar-action"></div>
        <button class="btn btn-sm" onclick="logout()">ログアウト</button>
      </div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">設計料管理</div>
    <div class="auth-sub">Design Fee Manager</div>
    <div id="auth-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
// ===== Supabase =====
const SUPABASE_URL     = 'https://sfvoizvsypkktcsxocez.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmdm9penZzeXBra3Rjc3hvY2V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDMzMzAsImV4cCI6MjA5MTYxOTMzMH0.5PX9WDNkqEHxRp8IjPzekCA2ZyQ_5ntOSm5O4NJhXrI';
const _sbFetch = (url, options = {}) => {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), 8000);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(id));
};
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: false, detectSessionInUrl: true },
  global: { fetch: _sbFetch }
});

// ===== Auth =====
function isOwner() { return localStorage.getItem('dfm2_role') === 'owner'; }

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'INITIAL_SESSION' || event === 'SIGNED_IN') {
    if (session) {
      localStorage.setItem('dfm2_role', 'owner');
      document.getElementById('auth-overlay').style.display = 'none';
      await loadData(); render();
    } else if (event === 'INITIAL_SESSION') {
      if (localStorage.getItem('dfm2_role') === 'engineer') {
        document.getElementById('auth-overlay').style.display = 'none';
        await loadData(); render();
      } else {
        localStorage.removeItem('dfm2_role');
        showAuthScreen();
      }
    }
    return;
  }
  if (event === 'SIGNED_OUT') {
    localStorage.removeItem('dfm2_role');
    state.projects = []; state.payments = []; state.financeMap = {};
    showAuthScreen();
  }
});

async function checkAuth() {
  // INITIAL_SESSION イベントがすべての認証を処理するため、ここはエンジニア用のみ
  if (localStorage.getItem('dfm2_role') === 'engineer') return;
  showAuthScreen(); // INITIAL_SESSION が来るまでのデフォルト表示
}

function showAuthScreen() {
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('auth-body').innerHTML = `
    <input class="auth-input" id="auth-email" type="email" placeholder="メールアドレス" autocomplete="email">
    <input class="auth-input" id="auth-pw" type="password" placeholder="パスワード" onkeydown="if(event.key==='Enter')loginOwner()" autocomplete="current-password">
    <button class="auth-btn auth-btn-primary" onclick="loginOwner()">担当者としてログイン</button>
    <div class="auth-divider">または</div>
    <button class="auth-btn" onclick="loginEngineer()">エンジニアとして続ける</button>
    <div id="auth-error" style="color:#A32D2D;font-size:12px;margin-top:4px;text-align:center;min-height:18px"></div>`;
}

async function loginOwner() {
  const email = document.getElementById('auth-email')?.value.trim();
  const pw    = document.getElementById('auth-pw')?.value;
  const err   = document.getElementById('auth-error');
  if (!email || !pw) { err.textContent = 'メールアドレスとパスワードを入力してください'; return; }
  err.textContent = 'ログイン中...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) err.textContent = 'メールアドレスまたはパスワードが正しくありません';
}

async function loginEngineer() {
  localStorage.setItem('dfm2_role', 'engineer');
  document.getElementById('auth-overlay').style.display = 'none';
  await loadData(); render();
}

async function logout() {
  localStorage.removeItem('dfm2_role');
  state.projects = []; state.payments = []; state.financeMap = {};
  if (isOwner()) sb.auth.signOut().catch(() => {}); // fire & forget
  showAuthScreen();
}

// ===== Constants =====
const DEFAULT_PHASES = [
  { name: '調査企画業務', ratio: 5  },
  { name: '基本計画業務', ratio: 10 },
  { name: '基本設計業務', ratio: 25 },
  { name: '実施設計業務', ratio: 40 },
  { name: '監理業務',     ratio: 20 },
  { name: 'その他業務',   ratio: 0  },
];
const STATUS_PROJECT = ['進行中', '完了', '保留', '見積中'];
const STATUS_PHASE   = ['未発行', '発行済', '入金済', '一部入金'];

// ===== State =====
let state = { page: 'dashboard', projects: [], payments: [], financeMap: {} };

// ===== Data =====
async function loadData() {
  let { data: projects, error: pErr } = await sb.from('projects').select('*').order('sort_order');
  if (pErr) {
    console.warn('sort_order fallback:', pErr.message);
    const res = await sb.from('projects').select('*');
    projects = res.data;
    if (res.error) console.error('loadData projects error:', res.error);
  }
  state.projects = projects || [];
  if (isOwner()) {
    const { data: finances, error: fErr } = await sb.from('projects_finance').select('*');
    if (fErr) console.error('loadData finance error:', fErr);
    state.financeMap = Object.fromEntries((finances || []).map(f => [f.project_id, f]));
    const { data: payments, error: pyErr } = await sb.from('payments').select('*').order('date');
    if (pyErr) console.error('loadData payments error:', pyErr);
    state.payments = payments || [];
  } else {
    state.financeMap = {};
    state.payments   = [];
  }
}

// ===== Phase helpers =====
function getMergedPhases(proj) {
  const pf = state.financeMap[proj.id]?.phases_finance || {};
  return (proj.phases || []).map(ph => ({
    ...ph,
    fee:        pf[ph.id]?.fee        || 0,
    feeWithTax: pf[ph.id]?.feeWithTax || 0,
  }));
}

function allPhases() {
  return state.projects.flatMap(p => getMergedPhases(p).map(ph => ({ ...ph, project: p })));
}

function phasePaid(phaseId) {
  return state.payments.filter(p => p.phase_id === phaseId).reduce((s, p) => s + Number(p.amount), 0);
}

function phaseBalance(phase) {
  return Number(phase.feeWithTax || 0) - phasePaid(phase.id);
}

function projectTotals(proj) {
  const phases      = getMergedPhases(proj);
  const totalFee    = phases.reduce((s, ph) => s + Number(ph.feeWithTax || 0), 0);
  const totalPaid   = phases.reduce((s, ph) => s + phasePaid(ph.id), 0);
  const activeCount = phases.filter(ph => Number(ph.feeWithTax || 0) > 0).length;
  const paidCount   = phases.filter(ph => Number(ph.feeWithTax || 0) > 0 && phaseBalance(ph) <= 0).length;
  return { totalFee, totalPaid, unpaid: totalFee - totalPaid, paidCount, activeCount };
}

// ===== Utils =====
function fmt(n)     { return Number(n || 0).toLocaleString('ja-JP'); }
function fmtSec(n)  { return isOwner() ? fmt(n) : '****'; }
function fmtDate(d) { return d ? d.replace(/-/g, '/') : '—'; }
function genId()    { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today()    { return new Date().toISOString().slice(0, 10); }
function statusBadge(s) {
  const m = { '進行中':'badge-info','完了':'badge-success','保留':'badge-warning','見積中':'badge-gray','未発行':'badge-gray','発行済':'badge-warning','入金済':'badge-success','一部入金':'badge-info','未入金':'badge-danger' };
  return m[s] || 'badge-gray';
}

// ===== Navigation =====
function switchPage(p) {
  state.page = p;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + p)?.classList.add('active');
  render();
}

function render() {
  const titles = { dashboard:'ダッシュボード', projects:'案件管理', invoices:'請求書一覧', payments:'入金管理', calc:'報酬計算', cashflow:'キャッシュフロー' };
  document.getElementById('page-title').textContent  = titles[state.page] || '';
  document.getElementById('role-badge').textContent  = isOwner() ? '担当者' : 'エンジニア';
  document.getElementById('nav-cashflow').style.display = isOwner() ? '' : 'none';
  const actionEl  = document.getElementById('topbar-action');
  const contentEl = document.getElementById('main-content');
  if      (state.page === 'dashboard') { actionEl.innerHTML = ''; renderDashboard(contentEl); }
  else if (state.page === 'projects')  { actionEl.innerHTML = ''; renderProjects(contentEl); }
  else if (state.page === 'invoices')  { actionEl.innerHTML = ''; renderInvoices(contentEl); }
  else if (state.page === 'payments')  { actionEl.innerHTML = ''; renderPayments(contentEl); }
  else if (state.page === 'calc')      { actionEl.innerHTML = ''; renderCalc(contentEl); }
  else if (state.page === 'cashflow')  { actionEl.innerHTML = ''; renderCashflow(contentEl); }
}

// ===== Dashboard =====
function renderDashboard(el) {
  const totalFee     = state.projects.reduce((s, p) => s + projectTotals(p).totalFee, 0);
  const totalPaid    = state.projects.reduce((s, p) => s + projectTotals(p).totalPaid, 0);
  const unpaid       = totalFee - totalPaid;
  const activeProj   = state.projects.filter(p => p.status === '進行中').length;
  const unpaidPhases = allPhases().filter(ph => Number(ph.feeWithTax || 0) > 0 && phaseBalance(ph) > 0);

  const projRows = state.projects.map(p => {
    const t   = projectTotals(p);
    const pct = t.activeCount > 0 ? Math.round(t.paidCount / t.activeCount * 100) : 0;
    return `<tr>
      <td><a style="color:#185FA5;cursor:pointer" onclick="openProjectDetail('${p.id}')">${p.name}</a></td>
      <td>${p.client || '—'}</td>
      <td style="text-align:right">¥${fmtSec(t.totalFee)}</td>
      <td style="min-width:130px">
        <div class="sub-text">${t.paidCount} / ${t.activeCount} フェーズ完了</div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      </td>
      <td><span class="badge ${statusBadge(p.status)}">${p.status}</span></td>
    </tr>`;
  }).join('');

  const unpaidRows = unpaidPhases.map(ph => {
    const bal = phaseBalance(ph);
    return `<tr>
      <td>${ph.project.name}</td><td>${ph.name}</td>
      <td>${ph.invoiceNumber || '—'}</td><td>${fmtDate(ph.dueDate)}</td>
      <td style="text-align:right;color:#A32D2D">¥${fmtSec(bal)}</td>
      <td><span class="badge ${statusBadge(ph.status)}">${ph.status}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="metrics metrics-4">
      <div class="metric-card"><div class="metric-label">受注総額（税込）</div><div class="metric-value">¥${fmtSec(totalFee)}</div><div class="metric-sub">${state.projects.length} 件</div></div>
      <div class="metric-card"><div class="metric-label">入金済合計</div><div class="metric-value">¥${fmtSec(totalPaid)}</div></div>
      <div class="metric-card"><div class="metric-label">未収残高</div><div class="metric-value" style="color:${unpaid>0?'#A32D2D':'inherit'}">¥${fmtSec(unpaid)}</div></div>
      <div class="metric-card"><div class="metric-label">進行中案件</div><div class="metric-value">${activeProj} 件</div><div class="metric-sub">未収フェーズ ${unpaidPhases.length} 件</div></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-title">案件別進捗</span><button class="btn btn-sm" onclick="switchPage('projects')">すべて表示</button></div>
      ${state.projects.length === 0 ? '<div class="empty-state">案件がありません</div>'
        : `<table><thead><tr><th>案件名</th><th>クライアント</th><th style="text-align:right">設計料合計（税込）</th><th>フェーズ進捗</th><th>状況</th></tr></thead><tbody>${projRows}</tbody></table>`}
    </div>
    <div class="section">
      <div class="section-header"><span class="section-title">未収フェーズ一覧</span></div>

function phaseRowHtml(ph) {
  const owner = isOwner();
  const statusOpts = STATUS_PHASE.map(s=>`<option${ph.status===s?' selected':''}>${s}</option>`).join('');
  return `<tr id="phrow-${ph.id}" draggable="true"

    ondragleave="phDragLeave(event)" ondrop="phDrop(event)" ondragend="phDragEnd(event)">
    <td class="drag-handle">⠿</td>
    <td><input value="${ph.name}"></td>
    ${owner ? `
    <td><input type="number" id="ph-ratio-${ph.id}" style="text-align:right" value="${ph.ratio}" min="0" max="100" oninput="recalcPhases()"></td>
    <td><input type="number" id="ph-fee-${ph.id}"   style="text-align:right" value="${ph.fee||0}" oninput="onManualFee('${ph.id}')"></td>
    <td><input type="number" id="ph-fwt-${ph.id}"   style="text-align:right" value="${ph.feeWithTax||0}" readonly></td>` : ''}
    <td><input id="ph-inv-${ph.id}"   value="${ph.invoiceNumber||''}"></td>
    <td><input id="ph-idate-${ph.id}" type="date" value="${ph.issueDate||''}"></td>
    <td><input id="ph-ddate-${ph.id}" type="date" value="${ph.dueDate||''}"></td>
    <td><select id="ph-st-${ph.id}">${statusOpts}</select></td>
    ${owner ? `<td><button class="icon-btn" type="button" onclick="removePhaseRow('${ph.id}')">✕</button></td>` : ''}
  </tr>`;
}

function onManualFee(id) {
  const fee = Number(document.getElementById('ph-fee-'+id)?.value||0);
  const tax = Number(document.getElementById('fp-taxRate')?.value||10);
  const el  = document.getElementById('ph-fwt-'+id);
  if (el) el.value = fee + Math.round(fee*tax/100);
  updatePhaseTotal();
}

function recalcPhases() {
  const cost    = Number(document.getElementById('fp-cost')?.value||0);
  const feeRate = Number(document.getElementById('fp-feeRate')?.value||10);
  const taxRate = Number(document.getElementById('fp-taxRate')?.value||10);
  const tbody   = document.getElementById('phase-tbody');
  if (!tbody) return;
  Array.from(tbody.querySelectorAll('tr')).forEach(row => {
    const id    = row.id.replace('phrow-','');
    const ratio = Number(document.getElementById('ph-ratio-'+id)?.value||0);
    const fee   = Math.round(cost*feeRate/100*ratio/100);
    const feeEl = document.getElementById('ph-fee-'+id);
    const fwtEl = document.getElementById('ph-fwt-'+id);
    if (feeEl) feeEl.value = fee;
    if (fwtEl) fwtEl.value = fee + Math.round(fee*taxRate/100);
  });
  updatePhaseTotal();
}

function updatePhaseTotal() {
  const el    = document.getElementById('phase-total');
  const tbody = document.getElementById('phase-tbody');
  if (!el||!tbody||!isOwner()) { if(el) el.innerHTML=''; return; }
  let totalRatio=0, totalFwt=0;
  Array.from(tbody.querySelectorAll('tr')).forEach(row => {
    const id = row.id.replace('phrow-','');
    totalRatio += Number(document.getElementById('ph-ratio-'+id)?.value||0);
    totalFwt   += Number(document.getElementById('ph-fwt-'+id)?.value||0);
  });
  const col = Math.abs(totalRatio-100)<0.01?'#27500A':'#A32D2D';
  el.innerHTML = `按分合計: <strong style="color:${col}">${totalRatio}%</strong>　設計料合計（税込）: <strong>¥${fmt(totalFwt)}</strong>`;
}

async function saveProject(id) {
  const name = document.getElementById('fp-name').value.trim();
  if (!name) { alert('案件名を入力してください'); return; }
  const finance  = id ? state.financeMap[id] : null;
  const phases   = getEditPhases(id);
  const phasesPublic = phases.map(({ id,name,ratio,invoiceNumber,issueDate,dueDate,status }) =>
    ({ id,name,ratio,invoiceNumber,issueDate,dueDate,status })
  );
  const projectId = id || genId();
  const sort_order = id ? undefined : (state.projects.length > 0 ? Math.max(...state.projects.map(p => p.sort_order ?? 0)) + 1 : 0);
  const { error: pErr } = await sb.from('projects').upsert({
    id: projectId, name,

          <div class="form-group"><label class="form-label">設計料率（%）</label><input id="c-rate" type="number" value="15" step="0.5" oninput="calcFee()"></div>

        <div class="form-row-3">${phaseInputs}</div>
        <div id="c-phase-result"></div>
      </div>
    </div>`;
}

function calcFee() {
  const cost    = Number(document.getElementById('c-cost')?.value||0)*10000;
  const rate    = Number(document.getElementById('c-rate')?.value||10);
  const taxRate = Number(document.getElementById('c-tax')?.value||10);
  const fee     = cost*rate/100;
  const tax     = Math.round(fee*taxRate/100);
  const rEl     = document.getElementById('c-result');
  if (!rEl) return;
  if (!cost) { rEl.innerHTML=''; document.getElementById('c-phase-result').innerHTML=''; return; }
  rEl.innerHTML = `<div class="metrics metrics-3" style="margin-bottom:8px">
    <div class="metric-card"><div class="metric-label">設計料（税抜）</div><div class="metric-value" style="font-size:18px">¥${fmtSec(fee)}</div></div>
    <div class="metric-card"><div class="metric-label">消費税</div><div class="metric-value" style="font-size:18px">¥${fmtSec(tax)}</div></div>
    <div class="metric-card"><div class="metric-label">設計料合計（税込）</div><div class="metric-value" style="font-size:18px">¥${fmtSec(fee+tax)}</div></div>
  </div>`;
  const phases = DEFAULT_PHASES.map((ph,i) => {
    const ratio = Number(document.getElementById('c-p'+i)?.value||0);
    const f=fee*ratio/100, t=Math.round(f*taxRate/100);
    return { name:ph.name, ratio, fee:f, fwt:f+t };
  });
  const totalRatio = phases.reduce((s,p)=>s+p.ratio,0);
  const col = Math.abs(totalRatio-100)<0.01?'#27500A':'#A32D2D';
  document.getElementById('c-phase-result').innerHTML = `
    <table>
      <thead><tr><th>フェーズ</th><th style="text-align:right">割合</th><th style="text-align:right">税抜金額</th><th style="text-align:right">税込金額</th></tr></thead>
      <tbody>${phases.map(p=>`<tr><td>${p.name}</td><td style="text-align:right">${p.ratio}%</td><td style="text-align:right">¥${fmtSec(p.fee)}</td><td style="text-align:right">¥${fmtSec(p.fwt)}</td></tr>`).join('')}</tbody>
      <tfoot><tr style="font-weight:500;background:#f9f9f7">
        <td>合計</td><td style="text-align:right;color:${col}">${totalRatio}%</td>
        <td style="text-align:right">¥${fmtSec(fee)}</td><td style="text-align:right">¥${fmtSec(fee+tax)}</td>
      </tr></tfoot>
    </table>`;
}

// ===== Cashflow =====
let _cfChart = null;
function renderCashflow(el) {
  const now = new Date();
  if (state.cashflowYear === undefined) {
    state.cashflowYear = now.getMonth() >= 5 ? now.getFullYear() : now.getFullYear() - 1;
  }
  const year = state.cashflowYear;
  // 6月スタートの12ヶ月
  const months = Array.from({length:12}, (_,i) => {
    const d = new Date(year, 5 + i, 1);
    return { label:`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`, year:d.getFullYear(), month:d.getMonth() };
  });
  const paym = new Array(12).fill(0);
  const ordm = new Array(12).fill(0);
  const subm = new Array(12).fill(0);
  state.payments.forEach(p => {
    if (!p.date) return;
    const d = new Date(p.date);
    const idx = months.findIndex(m => m.year===d.getFullYear() && m.month===d.getMonth());
    if (idx >= 0) paym[idx] += Number(p.amount||0);
  });
  Object.values(state.financeMap).forEach(f => {
    (f.orders||[]).forEach(o => {
      if (!o.date) return;
      const d = new Date(o.date);
      const idx = months.findIndex(m => m.year===d.getFullYear() && m.month===d.getMonth());
      if (idx >= 0) ordm[idx] += Number(o.amount||0);
    });
    (f.subcontractors||[]).forEach(s => {
      if (!s.date) return;
      const d = new Date(s.date);
      const idx = months.findIndex(m => m.year===d.getFullYear() && m.month===d.getMonth());
      if (idx >= 0) subm[idx] += Number(s.amount||0);
    });
  });
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <button class="btn btn-sm" onclick="state.cashflowYear--;render()">◀ 前期</button>
      <span style="font-size:14px;font-weight:500">${year}年6月 〜 ${year+1}年5月</span>
      <button class="btn btn-sm" onclick="state.cashflowYear++;render()">次期 ▶</button>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">キャッシュフロー（月別）</span>
        <span class="sub-text">上：入金 ／ 下：支払</span>
      </div>
      <div style="padding:20px;position:relative;height:440px"><canvas id="cf-canvas"></canvas></div>
    </div>`;
  if (_cfChart) { _cfChart.destroy(); _cfChart = null; }
  const ctx = document.getElementById('cf-canvas').getContext('2d');
  _cfChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(m => m.label),
      datasets: [
        { label:'入金（フェーズ）', data:paym, backgroundColor:'rgba(24,95,165,0.75)', stack:'income' },
        { label:'注文書売上',       data:ordm, backgroundColor:'rgba(39,128,10,0.75)',  stack:'income' },
        { label:'外注費',           data:subm.map(v=>-v), backgroundColor:'rgba(163,45,45,0.75)', stack:'expense' },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position:'top' },
        tooltip: { callbacks: { label: c=>`${c.dataset.label}: ¥${Math.abs(c.raw).toLocaleString('ja-JP')}` } }
      },
      scales: {
        x: { stacked: true },
        y: {
          stacked: true,
          ticks: { callback: v => `¥${(Math.abs(v)/10000).toLocaleString('ja-JP')}万` }
        }
      }
    }
  });
}

// ===== Project Drag & Drop =====
let _projDragSrc = null;
function projDragStart(e) { _projDragSrc=e.currentTarget; e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',_projDragSrc.dataset.projId); setTimeout(()=>_projDragSrc?.classList.add('ph-dragging'),0); }
function projDragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect='move'; if(e.currentTarget!==_projDragSrc) e.currentTarget.classList.add('ph-drag-over'); }
function projDragLeave(e) { e.currentTarget.classList.remove('ph-drag-over'); }
function projDrop(e) {
  e.preventDefault(); e.stopPropagation();
  const target=e.currentTarget; target.classList.remove('ph-drag-over');
  if (!_projDragSrc||_projDragSrc===target) return;
  const tbody=target.closest('tbody'), rows=Array.from(tbody.querySelectorAll('tr'));
  const si=rows.indexOf(_projDragSrc), ti=rows.indexOf(target);
  if (si<ti) tbody.insertBefore(_projDragSrc,target.nextSibling);
  else       tbody.insertBefore(_projDragSrc,target);
  saveProjectOrder();
}
function projDragEnd(e) { _projDragSrc?.classList.remove('ph-dragging'); document.querySelectorAll('#proj-tbody tr').forEach(r=>r.classList.remove('ph-drag-over')); _projDragSrc=null; }
async function saveProjectOrder() {
  const tbody = document.getElementById('proj-tbody');
  if (!tbody) return;
  const rows = Array.from(tbody.querySelectorAll('tr[data-proj-id]'));
  const updates = rows.map((r, i) => ({ id: r.dataset.projId, sort_order: i }));
  state.projects = updates.map(u => ({ ...state.projects.find(p=>p.id===u.id), sort_order: u.sort_order }));
  for (const u of updates) {
    await sb.from('projects').update({ sort_order: u.sort_order }).eq('id', u.id);
  }
}
